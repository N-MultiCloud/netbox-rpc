name: Publish PyPI package

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Package version to publish without the v tag prefix"
        required: true
        type: string

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set version from tag
        env:
          DISPATCH_VERSION: ${{ github.event.inputs.version }}
        run: |
          if [ -n "${DISPATCH_VERSION:-}" ]; then
            VERSION="$DISPATCH_VERSION"
          else
            VERSION="${GITHUB_REF#refs/tags/v}"
          fi
          export VERSION
          case "$VERSION" in
            ""|v*|*/*)
              echo "Invalid release tag: $GITHUB_REF" >&2
              exit 1
              ;;
          esac
          python - <<'PY'
          from pathlib import Path
          import os
          import re

          path = Path("pyproject.toml")
          text = path.read_text()
          version = os.environ["VERSION"]
          text = re.sub(r'(?m)^version = "[^"]+"', f'version = "{version}"', text, count=1)
          path.write_text(text)
          PY

      - name: Install build tools
        run: python -m pip install --upgrade build twine

      - name: Build package
        run: python -m build

      - name: Check package metadata
        run: python -m twine check dist/*

      - name: Publish package
        run: python -m twine upload --repository-url https://git.nmulti.cloud/api/packages/N-MultiCloud/pypi dist/*
        env:
          TWINE_USERNAME: ${{ secrets.PACKAGE_USER }}
          TWINE_PASSWORD: ${{ secrets.PACKAGE_WRITE_TOKEN }}
